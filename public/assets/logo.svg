<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#5DB075"/>
      <stop offset="100%" stop-color="#3D7E51"/>
    </linearGradient>
  </defs>

  <!-- 苹果主体（镂空线稿） -->
  <path d="M32 18
           C 28 18, 25 19.5, 23 21
           C 17 23, 14 29, 14 36
           C 14 46, 20 54, 29 54
           C 31 54, 32 52.5, 32 52.5
           C 32 52.5, 33 54, 35 54
           C 44 54, 50 46, 50 36
           C 50 29, 47 23, 41 21
           C 39 19.5, 36 18, 32 18 Z"
        stroke="url(#lineGrad)" stroke-width="2.2"
        stroke-linejoin="round" fill="none"/>

  <!-- 苹果枝（细线） -->
  <path d="M32 18 C 32 14, 33 11.5, 34.5 9.5"
        stroke="url(#lineGrad)" stroke-width="2.2"
        stroke-linecap="round" fill="none"/>

  <!-- 叶子（镂空） -->
  <path d="M34.5 9.5
           C 41 6, 49 8, 51 13.5
           C 45 15.5, 38 14, 34.5 11.5 Z"
        stroke="url(#lineGrad)" stroke-width="2.2"
        stroke-linejoin="round" fill="none"/>

  <!-- 叶脉（细线） -->
  <path d="M35 11 C 40 12, 45 13, 49 13.5"
        stroke="url(#lineGrad)" stroke-width="1"
        stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- 极简高光：左上一小撇线 -->
  <path d="M20 28 C 19 32, 19 35, 20 38"
        stroke="url(#lineGrad)" stroke-width="1.2"
        stroke-linecap="round" fill="none" opacity="0.35"/>
</svg>
